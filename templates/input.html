<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cricket Input</title>
  <style>
    body { margin: 0; padding: 16px; background: #0d1b2a; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    h1, h2 { text-align: center; }
    input, select, button { width: 100%; min-height: 56px; margin: 6px 0; font-size: 18px; border-radius: 10px; border: 1px solid #355; }
    button { background: #1a6b2f; color: #fff; font-weight: 700; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .panel-btn.active { border: 2px solid #e8a020; }
    .panel-btn:disabled { opacity: .5; background: #555; }
    .danger { background: #8b1f1f; }
    .hidden { display: none; }
    .over-item { display: inline-block; padding: 6px 10px; margin: 2px; border-radius: 12px; background: #223; font-weight: 700; }
    .dot { background: #6b7280; }
    .b4 { color: #f0c040; }
    .b6, .bw { color: #e05050; }
    .bx { color: #8fc7ff; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; }
    .modal-card { background: #162032; border-radius: 12px; padding: 24px; width: min(92vw, 480px); }
  </style>
</head>
<body>
  <div id="setupScreen">
    <h1>MATCH SETUP</h1>
    <input id="team1Name" placeholder="Team 1 Name">
    <input id="team2Name" placeholder="Team 2 Name">
    <label>Toss Winner</label>
    <select id="tossWinner">
      <option value="team1">Team 1</option>
      <option value="team2">Team 2</option>
    </select>
    <label>Toss Decision</label>
    <select id="tossDecision">
      <option value="bat">Bat first</option>
      <option value="bowl">Bowl first</option>
    </select>
    <label>Theme</label>
    <select id="themeSelect">
      <option value="classic">Classic</option>
      <option value="neon">Neon</option>
      <option value="minimal">Minimal</option>
    </select>
    <div class="grid2">
      <div><label>Team 1 Color</label><input id="team1Color" type="color" value="#2dd4bf"></div>
      <div><label>Team 2 Color</label><input id="team2Color" type="color" value="#f59e0b"></div>
    </div>
    <label>Scoring Type</label>
    <select id="scoringType">
      <option value="ball_by_ball">Ball by ball</option>
      <option value="over_only">Over by over</option>
    </select>
    <input id="totalOvers" type="number" value="20" placeholder="Total Overs">
    <h2>TEAM 1 SQUAD</h2><div id="team1Inputs"></div>
    <h2>TEAM 2 SQUAD</h2><div id="team2Inputs"></div>
    <button id="startMatch">START MATCH</button>
  </div>

  <div id="matchScreen" class="hidden">
    <div id="scoreBar">-</div>
    <div id="ballByBallSection">
    <label>Striker</label><select id="striker"></select>
    <label>Non-Striker</label><select id="nonStriker"></select>
    <label>Bowler</label><select id="bowler"></select>
    <div class="grid4">
      <button data-ball=".">·</button><button data-ball="1">1</button><button data-ball="2">2</button><button data-ball="3">3</button>
      <button data-ball="4">4</button><button data-ball="6">6</button><button data-ball="W">W</button><button data-ball="Wd">Wd</button>
    </div>
    <div class="grid2"><button data-ball="Bye">Bye</button><button data-ball="Lb">Lb</button></div>
    <div class="grid2"><button data-ball="Nb">Nb</button><input id="extraRuns" type="number" min="0" max="6" value="0" placeholder="Extra runs"></div>
    <h3>THIS OVER</h3>
    <div id="thisOver"></div>
    <div class="grid2"><button id="undoBtn">← UNDO</button><button id="redoBtn">REDO →</button></div>
    </div>
    <div id="overOnlySection" class="hidden">
      <h3>OVER UPDATE</h3>
      <input id="overRunsInput" type="number" min="0" value="0" placeholder="Runs this over">
      <input id="overWktsInput" type="number" min="0" max="10" value="0" placeholder="Wickets this over">
      <button id="applyOverUpdateBtn">APPLY OVER UPDATE</button>
      <div class="grid2"><button id="undoOverBtn">← UNDO</button><button id="redoOverBtn">REDO →</button></div>
    </div>
    <div class="grid2"><button id="endOverBtn">END OVER</button><div id="scoringHint"></div></div>
    <h3>LAWS / SPECIAL EVENTS</h3>
    <div class="grid2">
      <button id="retireStrikerHurtBtn">Retire Striker Hurt</button>
      <button id="retireStrikerUnhurtBtn">Retire Striker Unhurt</button>
      <button id="retireNonStrikerHurtBtn">Retire Non-Striker Hurt</button>
      <button id="retireNonStrikerUnhurtBtn">Retire Non-Striker Unhurt</button>
    </div>
    <div class="grid2">
      <button id="runOutStrikerBtn">Run-out Striker</button>
      <button id="runOutNonStrikerBtn">Run-out Non-Striker</button>
      <button id="stumpedBtn">Stumped (Striker)</button>
      <button id="hitWicketBtn">Hit wicket (Striker)</button>
    </div>
    <div class="grid2">
      <button id="penaltyRunsBtn">+5 Penalty Runs</button>
      <button id="deadBallBtn">Dead Ball (log)</button>
    </div>
    <h3>OVERLAY PANEL</h3>
    <div class="grid2">
      <button class="panel-btn" data-panel="score">Score</button>
      <button class="panel-btn" data-panel="batting">Batting</button>
      <button class="panel-btn" data-panel="bowling">Bowling</button>
      <button class="panel-btn" data-panel="chase" id="chaseBtn">Chase</button>
      <button class="panel-btn" data-panel="fullscore" id="fullBtn">Full</button>
    </div>
    <div class="grid2">
      <button id="densityCompactBtn">Compact Overlay</button>
      <button id="densityExpandedBtn">Expanded Overlay</button>
    </div>
    <div class="grid2"><button id="editOpen">Edit Score</button><button id="secondOpen">2nd Innings</button></div>
    <button id="newMatchBtn" class="danger">NEW MATCH</button>
  </div>

  <div id="editModal" class="modal"><div class="modal-card">
    <h3>EDIT SCORE</h3>
    <input id="eRuns" type="number" placeholder="Runs">
    <input id="eWickets" type="number" placeholder="Wickets">
    <input id="eOvers" type="number" placeholder="Overs">
    <input id="eBalls" type="number" min="0" max="5" placeholder="Balls">
    <input id="eExtras" type="number" placeholder="Extras">
    <div class="grid2"><button onclick="closeModal('editModal')">CANCEL</button><button id="saveEdit">SAVE</button></div>
  </div></div>

    <div id="wicketModal" class="modal"><div class="modal-card">
    <h3>WICKET</h3><p>Select new batter:</p><select id="newBatter"></select>
    <p id="wicketInfo"></p>
    <div class="grid2"><button onclick="closeModal('wicketModal')">CANCEL</button><button id="confirmWicket">CONFIRM</button></div>
  </div></div>

  <div id="secondModal" class="modal"><div class="modal-card">
    <h3>START 2ND INNINGS</h3><p id="targetText">Target: -</p>
    <input id="secondBattingTeam" placeholder="New batting team">
    <p>Squad pre-filled from 1st innings (edit only if needed):</p>
    <div id="secondSquad"></div>
    <div class="grid2"><button onclick="closeModal('secondModal')">CANCEL</button><button id="startSecond">START 2ND INNINGS</button></div>
  </div></div>

  <script>
    let score = null;
    const byId = (id) => document.getElementById(id);
    const pendingKey = "score_pending_actions";
    async function api(url, method = "GET", body = null) {
      try {
        const res = await fetch(url, { method, headers: { "Content-Type": "application/json" }, body: body ? JSON.stringify(body) : undefined });
        if (!res.ok) throw new Error("request failed");
        return await res.json();
      } catch (e) {
        if (method !== "GET") {
          const queue = JSON.parse(localStorage.getItem(pendingKey) || "[]");
          queue.push({ url, method, body });
          localStorage.setItem(pendingKey, JSON.stringify(queue));
        }
        throw e;
      }
    }
    function closeModal(id) { byId(id).style.display = "none"; }
    function openModal(id) { byId(id).style.display = "flex"; }

    function buildInputs(container, prefix) {
      const root = byId(container); root.innerHTML = "";
      for (let i = 1; i <= 11; i++) { const el = document.createElement("input"); el.id = `${prefix}${i}`; el.placeholder = `Player ${i}`; root.appendChild(el); }
    }
    buildInputs("team1Inputs", "t1");
    buildInputs("team2Inputs", "t2");
    buildInputs("secondSquad", "sec");

    function names(prefix) { return Array.from({ length: 11 }, (_, i) => byId(`${prefix}${i+1}`).value.trim()).filter(Boolean); }
    function setSelect(id, items, selected, allowOut) {
      const placeholder = id === "striker" && !selected ? "Select new batter" : "Select";
      const sel = byId(id); sel.innerHTML = `<option value="">${placeholder}</option>`;
      items.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.name; opt.textContent = p.name;
        if (!allowOut && p.status === "out") {
          opt.textContent = `${p.name} (out)`;
          opt.style.textDecoration = "line-through";
          opt.style.opacity = "0.55";
          opt.disabled = true;
        }
        if (!allowOut && p.status === "retired out") {
          opt.textContent = `${p.name} (retired out)`;
          opt.style.textDecoration = "line-through";
          opt.style.opacity = "0.5";
          opt.disabled = true;
        }
        if (p.status === "retired hurt") {
          opt.textContent = `${p.name} (retired hurt)`;
          opt.style.opacity = "0.85";
        }
        if (p.status === "yet to bat") opt.style.opacity = "0.7";
        if (selected === p.name) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    function render() {
      if (!score) return;
      byId("setupScreen").classList.toggle("hidden", score.match_started);
      byId("matchScreen").classList.toggle("hidden", !score.match_started);
      if (!score.match_started) return;
      const overOnly = score.scoring_mode === "over_only";
      byId("ballByBallSection").classList.toggle("hidden", overOnly);
      byId("overOnlySection").classList.toggle("hidden", !overOnly);
      byId("scoreBar").textContent = `${score.batting_team} ${score.runs}/${score.wickets} (${score.overs}.${score.balls})`;
      setSelect("striker", score.batting_squad || [], score.striker, false);
      setSelect("nonStriker", score.batting_squad || [], score.non_striker, false);
      setSelect("bowler", score.bowling_squad || [], score.current_bowler, true);
      const overClass = (v) => {
        if (v === ".") return "dot";
        if (v === "4") return "b4";
        if (v === "6") return "b6";
        if (v === "W") return "bw";
        if (v === "Wd" || v === "Nb") return "bx";
        return "";
      };
      byId("thisOver").innerHTML = (score.current_over || []).map(v => `<span class="over-item ${overClass(v)}">${v}</span>`).join("");
      document.querySelectorAll(".panel-btn").forEach(b => b.classList.toggle("active", b.dataset.panel === score.active_panel));
      byId("chaseBtn").disabled = score.innings === 1;
      byId("targetText").textContent = `Target: ${(score.runs || 0) + 1} runs`;
      byId("secondBattingTeam").value = score.bowling_team || "";
      if (score.innings === 2 && score.runs_needed === 0) byId("scoringHint").textContent = "Chase complete";
      else if (score.balls === 0 && score.current_over.length === 0) byId("scoringHint").textContent = "Select bowler";
      else byId("scoringHint").textContent = "";
    }

    async function flushQueue() {
      const queue = JSON.parse(localStorage.getItem(pendingKey) || "[]");
      if (!queue.length) return;
      const remaining = [];
      for (const item of queue) {
        try {
          await api(item.url, item.method, item.body);
        } catch (e) {
          remaining.push(item);
          break;
        }
      }
      localStorage.setItem(pendingKey, JSON.stringify(remaining));
    }

    async function refresh() {
      try {
        await flushQueue();
        score = await api("/score");
        render();
      } catch (e) {}
    }

    byId("startMatch").onclick = async () => {
      const team1_squad = names("t1"), team2_squad = names("t2");
      if (team1_squad.length < 2 || team2_squad.length < 2) return alert("Minimum 2 players per squad required");
      const team1 = byId("team1Name").value.trim();
      const team2 = byId("team2Name").value.trim();
      const scoringMode = byId("scoringType").value;
      const tossWinner = byId("tossWinner").value === "team1" ? team1 : team2;
      const tossDecision = byId("tossDecision").value;
      const batting_squad = tossDecision === "bat"
        ? (byId("tossWinner").value === "team1" ? team1_squad : team2_squad)
        : (byId("tossWinner").value === "team1" ? team2_squad : team1_squad);
      const bowling_squad = tossDecision === "bat"
        ? (byId("tossWinner").value === "team1" ? team2_squad : team1_squad)
        : (byId("tossWinner").value === "team1" ? team1_squad : team2_squad);
      score = await api("/setup", "POST", {
        team1,
        team2,
        team1_color: byId("team1Color").value,
        team2_color: byId("team2Color").value,
        theme: byId("themeSelect").value,
        toss_winner: tossWinner,
        toss_decision: tossDecision,
        scoring_mode: scoringMode,
        total_overs: Number(byId("totalOvers").value || 20),
        batting_squad, bowling_squad
      });
      render();
    };

    document.querySelectorAll("[data-ball]").forEach(btn => btn.onclick = async () => {
      const extraRuns = Number(byId("extraRuns").value || 0);
      score = await api("/ball", "POST", { type: btn.dataset.ball, runs: extraRuns }); render();
      if (btn.dataset.ball === "W") {
        const left = (score.batting_squad || []).filter(p => p.status === "yet to bat");
        byId("newBatter").innerHTML = left.map(p => `<option value="${p.name}">${p.name}</option>`).join("");
        byId("wicketInfo").textContent = left.length ? "" : "Last wicket — innings complete";
        byId("confirmWicket").disabled = left.length === 0;
        openModal("wicketModal");
      }
    });
    byId("confirmWicket").onclick = async () => { await api("/set-players", "POST", { striker: byId("newBatter").value }); closeModal("wicketModal"); await refresh(); };
    byId("undoBtn").onclick = async () => { await api("/undo", "POST"); await refresh(); };
    byId("redoBtn").onclick = async () => { await api("/redo", "POST"); await refresh(); };
    byId("undoOverBtn").onclick = async () => { await api("/undo", "POST"); await refresh(); };
    byId("redoOverBtn").onclick = async () => { await api("/redo", "POST"); await refresh(); };
    byId("endOverBtn").onclick = async () => { await api("/end-over", "POST"); await refresh(); };
    byId("applyOverUpdateBtn").onclick = async () => {
      const runs = Number(byId("overRunsInput").value || 0);
      const wickets = Number(byId("overWktsInput").value || 0);
      await api("/over-update", "POST", { runs, wickets });
      byId("overRunsInput").value = "0";
      byId("overWktsInput").value = "0";
      await refresh();
    };
    byId("retireStrikerHurtBtn").onclick = async () => { await api("/retire-batter", "POST", { batter: "striker", type: "hurt" }); await refresh(); };
    byId("retireStrikerUnhurtBtn").onclick = async () => { await api("/retire-batter", "POST", { batter: "striker", type: "unhurt" }); await refresh(); };
    byId("retireNonStrikerHurtBtn").onclick = async () => { await api("/retire-batter", "POST", { batter: "non_striker", type: "hurt" }); await refresh(); };
    byId("retireNonStrikerUnhurtBtn").onclick = async () => { await api("/retire-batter", "POST", { batter: "non_striker", type: "unhurt" }); await refresh(); };
    byId("runOutStrikerBtn").onclick = async () => { await api("/record-dismissal", "POST", { kind: "run_out", batter: "striker", legal_delivery: true, add_ball: true, credited_to_bowler: false }); await refresh(); };
    byId("runOutNonStrikerBtn").onclick = async () => { await api("/record-dismissal", "POST", { kind: "run_out", batter: "non_striker", legal_delivery: true, add_ball: true, credited_to_bowler: false }); await refresh(); };
    byId("stumpedBtn").onclick = async () => { await api("/record-dismissal", "POST", { kind: "stumped", batter: "striker", legal_delivery: false, add_ball: false, credited_to_bowler: true }); await refresh(); };
    byId("hitWicketBtn").onclick = async () => { await api("/record-dismissal", "POST", { kind: "hit_wicket", batter: "striker", legal_delivery: true, add_ball: true, credited_to_bowler: true }); await refresh(); };
    byId("penaltyRunsBtn").onclick = async () => { await api("/penalty-runs", "POST", { runs: 5, side: "batting", reason: "law penalty" }); await refresh(); };
    byId("deadBallBtn").onclick = async () => { await api("/dead-ball", "POST", { note: "umpire dead ball" }); await refresh(); };
    byId("striker").onchange = async () => { await api("/set-players", "POST", { striker: byId("striker").value }); await refresh(); };
    byId("nonStriker").onchange = async () => { await api("/set-players", "POST", { non_striker: byId("nonStriker").value }); await refresh(); };
    byId("bowler").onchange = async () => { await api("/set-players", "POST", { current_bowler: byId("bowler").value }); await refresh(); };
    document.querySelectorAll("[data-panel]").forEach(btn => btn.onclick = async () => { await api("/set-panel", "POST", { panel: btn.dataset.panel }); await refresh(); });
    byId("densityCompactBtn").onclick = async () => { await api("/set-overlay-density", "POST", { density: "compact" }); await refresh(); };
    byId("densityExpandedBtn").onclick = async () => { await api("/set-overlay-density", "POST", { density: "expanded" }); await refresh(); };

    byId("editOpen").onclick = () => { ["runs","wickets","overs","balls","extras"].forEach(k => byId(`e${k[0].toUpperCase()}${k.slice(1)}`).value = score[k]); openModal("editModal"); };
    byId("saveEdit").onclick = async () => {
      await api("/edit", "POST", { runs:+byId("eRuns").value, wickets:+byId("eWickets").value, overs:+byId("eOvers").value, balls:+byId("eBalls").value, extras:+byId("eExtras").value });
      closeModal("editModal"); await refresh();
    };

    byId("secondOpen").onclick = () => {
      const nextBatting = (score.bowling_squad || []).map(p => p.name).filter(Boolean);
      for (let i = 1; i <= 11; i++) {
        byId(`sec${i}`).value = nextBatting[i - 1] || "";
      }
      openModal("secondModal");
    };
    byId("startSecond").onclick = async () => {
      await api("/start-second-innings", "POST", {
        batting_team: byId("secondBattingTeam").value.trim(),
        batting_squad: names("sec"),
        bowling_squad: (score.batting_squad || []).map(p => p.name)
      });
      closeModal("secondModal"); await refresh();
    };

    byId("newMatchBtn").onclick = async () => {
      const ok = confirm("Close current match and return to setup?");
      if (!ok) return;
      score = await api("/reset-match", "POST");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
    window.addEventListener("keydown", async (e) => {
      if (e.key === "1") return document.querySelector('[data-ball="1"]').click();
      if (e.key === "2") return document.querySelector('[data-ball="2"]').click();
      if (e.key === "3") return document.querySelector('[data-ball="3"]').click();
      if (e.key === "4") return document.querySelector('[data-ball="4"]').click();
      if (e.key === "6") return document.querySelector('[data-ball="6"]').click();
      if (e.key.toLowerCase() === "w") return document.querySelector('[data-ball="W"]').click();
      if (e.key.toLowerCase() === "z") { await api("/undo", "POST"); return refresh(); }
      if (e.key.toLowerCase() === "y") { await api("/redo", "POST"); return refresh(); }
    });

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
