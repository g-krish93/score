<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cricket Overlay</title>
  <style>
    :root { --team1: #2dd4bf; --team2: #f59e0b; --bg: rgba(0,0,0,.82); --fg: #fff; --muted: #aaa; --overlay-scale: 1; }
    body { margin: 0; padding: 0; background: transparent; font-family: "Courier New", Courier, monospace; }
    #overlay { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); color: var(--fg); padding: calc(12px * var(--overlay-scale)) calc(16px * var(--overlay-scale)); border-top: 2px solid rgba(255,255,255,.08); font-size: calc(16px * var(--overlay-scale)); }
    .muted { color: #aaa; }
    .title { font-weight: 800; }
    .section-title { color: #aaa; font-size: calc(12px * var(--overlay-scale)); letter-spacing: 1px; text-transform: uppercase; }
    #stale { position: absolute; right: 16px; top: 8px; color: #ff4040; display: none; }
    .row { margin: 4px 0; white-space: pre; }
    .result { color: #22c55e; font-weight: 800; letter-spacing: .3px; }
    .team1 { color: var(--team1); }
    .team2 { color: var(--team2); }
    #flash { position: absolute; left: 16px; top: 8px; font-weight: 900; display: none; }
    #momentum { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
    .mom { font-size: calc(11px * var(--overlay-scale)); border-radius: 999px; padding: calc(2px * var(--overlay-scale)) calc(6px * var(--overlay-scale)); background: rgba(255,255,255,.08); }
    .mom.w { background: rgba(255,61,61,.25); }
    .mom.f { background: rgba(240,192,64,.28); }
    .mom.s { background: rgba(255,93,93,.28); }
    .score-pop { animation: pop .35s ease-out; display: inline-block; }
    #pressureWrap { margin-top: 4px; height: 6px; border-radius: 999px; background: rgba(255,255,255,.13); overflow: hidden; display: none; }
    #pressureFill { height: 100%; width: 0%; transition: width .35s ease; background: linear-gradient(90deg,#22c55e,#eab308,#ef4444); }
    .flash-4 { color: #f0c040; text-shadow: 0 0 8px rgba(240,192,64,.5); }
    .flash-6 { color: #ff5d5d; text-shadow: 0 0 8px rgba(255,93,93,.6); }
    .flash-w { color: #ff3d3d; text-shadow: 0 0 8px rgba(255,61,61,.6); }
    .theme-neon { --bg: rgba(9, 11, 26, .92); --fg: #d6f6ff; --muted: #79a7b4; }
    .theme-neon #overlay { border-top: 2px solid rgba(85, 245, 255, .5); box-shadow: 0 0 20px rgba(85,245,255,.2); }
    .theme-minimal { --bg: rgba(0,0,0,.64); }
    .theme-minimal #overlay { border-top: none; padding: 8px 12px; }
    .density-compact #overlay { padding: 6px 10px; }
    .density-compact .row { font-size: 12px; margin: 2px 0; }
    @media (max-aspect-ratio: 10/16) {
      #overlay { padding: 8px 10px; }
      .row { font-size: 12px; margin: 2px 0; }
    }
    @keyframes pop {
      0% { transform: scale(1.0); }
      45% { transform: scale(1.12); }
      100% { transform: scale(1.0); }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="stale">●</div>
    <div id="flash"></div>
    <div id="matchTag" class="row muted"></div>
    <div id="content" class="row">Loading...</div>
    <div id="pressureWrap"><div id="pressureFill"></div></div>
    <div id="momentum"></div>
  </div>
  <script>
    let lastData = null;
    let failCount = 0;
    let lastBallToken = "";
    let lastScoreKey = "";
    const MATCH_ID = "{{ match_id|default('default') }}";
    const MATCH_QUERY = `match=${encodeURIComponent(MATCH_ID)}`;
    function withMatch(url) {
      const sep = url.includes("?") ? "&" : "?";
      return `${url}${sep}${MATCH_QUERY}`;
    }

    const text = (v) => (v === null || v === undefined || v === "" ? "—" : String(v));
    const pad = (v) => text(v).padEnd(18, " ");
    function setTheme(data) {
      const body = document.body;
      body.classList.remove("theme-classic", "theme-neon", "theme-minimal");
      body.classList.add(`theme-${data.theme || "classic"}`);
      body.classList.toggle("density-compact", (data.overlay_density || "expanded") === "compact");
      document.documentElement.style.setProperty("--team1", data.team1_color || "#2dd4bf");
      document.documentElement.style.setProperty("--team2", data.team2_color || "#f59e0b");
      document.documentElement.style.setProperty("--overlay-scale", String(data.overlay_scale || 1));
    }
    function renderMomentum(data) {
      const holder = document.getElementById("momentum");
      const list = (data.current_over || []).slice(-6);
      holder.innerHTML = list.map((v) => {
        const low = String(v).toLowerCase();
        const cls = low.includes("w") ? "w" : low === "4" ? "f" : low === "6" ? "s" : "";
        return `<span class="mom ${cls}">${v}</span>`;
      }).join("");
    }
    function renderPressure(data) {
      const wrap = document.getElementById("pressureWrap");
      const fill = document.getElementById("pressureFill");
      if (data.innings !== 2 || data.rrr === null || data.crr === null) {
        wrap.style.display = "none";
        fill.style.width = "0%";
        return;
      }
      wrap.style.display = "block";
      const ratio = Math.max(0, Math.min(2, Number(data.rrr || 0) / Math.max(0.1, Number(data.crr || 0))));
      fill.style.width = `${Math.round((ratio / 2) * 100)}%`;
    }
    function maybeFlash(data) {
      const token = (data.current_over || [])[data.current_over.length - 1] || "";
      if (!token || token === lastBallToken) return;
      lastBallToken = token;
      const flash = document.getElementById("flash");
      flash.className = "";
      if (token.startsWith("4")) { flash.textContent = "FOUR!"; flash.classList.add("flash-4"); }
      else if (token.startsWith("6")) { flash.textContent = "SIX!"; flash.classList.add("flash-6"); }
      else if (token.startsWith("W")) { flash.textContent = "WICKET!"; flash.classList.add("flash-w"); }
      else return;
      flash.style.display = "block";
      setTimeout(() => { flash.style.display = "none"; }, 1200);
    }

    function renderOverlay(data) {
      setTheme(data);
      maybeFlash(data);
      renderMomentum(data);
      renderPressure(data);
      const panel = data.active_panel || "score";
      const content = document.getElementById("content");
      const resultRow = (data.match_complete && data.match_result)
        ? `<div class="row result">${text(data.match_result)}</div>`
        : "";
      if (panel === "batting") {
        const rows = (data.batting_squad || []).filter(p => p.status === "batting" || p.status === "out");
        if (!rows.length) { content.innerHTML = resultRow + '<div class="row section-title">BATTING</div><div class="row muted">— —</div>'; return; }
        content.innerHTML = resultRow + '<div class="row section-title">BATTING</div>' + rows.map(p =>
          `<div class="row ${p.status === "out" ? "muted" : ""}">${pad(p.name)} ${p.runs} (${p.balls})</div>`
        ).join("");
        return;
      }
      if (panel === "bowling") {
        const rows = (data.bowling_squad || []).filter(p => p.overs > 0 || p.balls > 0);
        if (!rows.length) { content.innerHTML = resultRow + '<div class="row section-title">BOWLING</div><div class="row muted">— —</div>'; return; }
        content.innerHTML = resultRow + '<div class="row section-title">BOWLING</div>' + rows.map(p =>
          `<div class="row ${p.name === data.current_bowler ? "" : "muted"}">${pad(p.name)} ${p.overs}.${p.balls}-${p.maidens || 0}-${p.runs}-${p.wickets}</div>`
        ).join("");
        return;
      }
      if (panel === "chase") {
        if (data.innings !== 2) { content.innerHTML = resultRow + '<div class="row muted">— 2nd innings only —</div>'; return; }
        content.innerHTML =
          resultRow +
          `<div class="row"><span class="title">${text(data.batting_team)}</span> need ${text(data.runs_needed)} runs</div>` +
          `<div class="row">from ${text(data.balls_remaining)} balls  RRR: ${text(data.rrr)}</div>`;
        return;
      }
      if (panel === "fullscore") {
        const batters = (data.batting_squad || []).filter(p => p.status === "batting" || p.status === "out");
        const bowlers = (data.bowling_squad || []).filter(p => p.overs > 0 || p.balls > 0 || p.name === data.current_bowler);
        const batterRows = batters.length
          ? batters.map(p => `<div class="row ${p.status === "out" ? "muted" : ""}">${pad(p.name)} ${p.runs} (${p.balls})</div>`).join("")
          : '<div class="row muted">— —</div>';
        const bowlerRows = bowlers.length
          ? bowlers.map(p => `<div class="row ${p.name === data.current_bowler ? "" : "muted"}">${pad(p.name)} ${p.overs}.${p.balls}-${p.maidens || 0}-${p.runs}-${p.wickets}</div>`).join("")
          : '<div class="row muted">— —</div>';
        const chaseLine = data.innings === 2
          ? `<div class="row">T:${text(data.target)} Need ${text(data.runs_needed)} off ${text(data.balls_remaining)}b RRR:${text(data.rrr)}</div>`
          : `<div class="row">CRR: ${text(data.crr)}</div>`;
        content.innerHTML =
          resultRow +
          `<div class="row"><span class="title team1">${text(data.batting_team)}</span> <span class="muted">vs <span class="team2">${text(data.bowling_team)}</span></span></div>` +
          `<div class="row">${text(data.runs)}/${text(data.wickets)} (${text(data.overs_display)} ov)</div>` +
          chaseLine +
          `<div class="row section-title">Batting</div>` + batterRows +
          `<div class="row section-title">Bowling</div>` + bowlerRows;
        return;
      }
      if (data.innings === 2) {
        const scoreKey = `${data.runs}-${data.wickets}`;
        const popClass = scoreKey !== lastScoreKey ? "score-pop" : "";
        lastScoreKey = scoreKey;
        content.innerHTML =
          resultRow +
          `<div class="row"><span class="title team1">${text(data.batting_team)}</span> <span class="muted">vs <span class="team2">${text(data.bowling_team)}</span></span></div>` +
          `<div class="row"><span class="${popClass}">${text(data.runs)}/${text(data.wickets)}</span> (${text(data.overs_display)} ov) T:${text(data.target)} Need ${text(data.runs_needed)} off ${text(data.balls_remaining)}b</div>`;
      } else {
        const scoreKey = `${data.runs}-${data.wickets}`;
        const popClass = scoreKey !== lastScoreKey ? "score-pop" : "";
        lastScoreKey = scoreKey;
        content.innerHTML =
          resultRow +
          `<div class="row"><span class="title team1">${text(data.batting_team)}</span> <span class="muted">vs <span class="team2">${text(data.bowling_team)}</span></span></div>` +
          `<div class="row"><span class="${popClass}">${text(data.runs)}/${text(data.wickets)}</span> (${text(data.overs_display)} ov) CRR: ${text(data.crr)}</div>`;
      }
    }

    async function fetchScore() {
      try {
        const res = await fetch(withMatch("/score"));
        if (!res.ok) throw new Error("non-200");
        lastData = await res.json();
        failCount = 0;
        document.getElementById("stale").style.display = "none";
        renderOverlay(lastData);
      } catch (e) {
        failCount += 1;
        if (failCount >= 3) document.getElementById("stale").style.display = "block";
        if (lastData) renderOverlay(lastData);
      }
    }

    fetchScore();
    document.getElementById("matchTag").textContent = `Stream: ${MATCH_ID}`;
    setInterval(fetchScore, 2000);
  </script>
</body>
</html>
